name: Build portable release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up build Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Validate tag and version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match VERSION v$version"
          }

      - name: Build and test portable package
        shell: pwsh
        run: ./scripts/build-portable.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-chat-gateway-windows-x64
          path: |
            dist/*.7z
            dist/*.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $files = @(Get-ChildItem dist -File | Where-Object { $_.Extension -eq '.7z' -or $_.Name -like '*.sha256' } | ForEach-Object FullName)
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @files --clobber
          } else {
            gh release create $tag @files --title $tag --generate-notes
          }
