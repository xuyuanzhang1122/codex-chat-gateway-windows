name: Build Studio release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  studio-windows-x64:
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate tag and VERSION
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $tag = $env:GITHUB_REF_NAME
          if ("v$version" -ne $tag) {
            throw "Tag $tag does not match VERSION v$version"
          }

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop-tauri/package-lock.json

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-tauri/src-tauri/target
            native-gateway/target
          key: ${{ runner.os }}-cargo-studio-${{ hashFiles('desktop-tauri/src-tauri/Cargo.lock', 'native-gateway/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-studio-

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          if ($LASTEXITCODE -ne 0) { throw "choco install innosetup failed: $LASTEXITCODE" }
          $pf86 = [Environment]::GetEnvironmentVariable("ProgramFiles(x86)")
          $candidates = @(
            (Join-Path $pf86 "Inno Setup 6\ISCC.exe"),
            (Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe"),
            (Join-Path $pf86 "Inno Setup 5\ISCC.exe")
          )
          $iscc = $candidates | Where-Object { $_ -and (Test-Path -LiteralPath $_) } | Select-Object -First 1
          if (-not $iscc) {
            $iscc = Get-ChildItem -Path $pf86,$env:ProgramFiles -Filter ISCC.exe -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $iscc) { throw "ISCC.exe not found after choco install innosetup" }
          Write-Host "ISCC=$iscc"
          "ISCC=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Studio installer
        shell: pwsh
        run: |
          if (-not $env:ISCC) { throw "ISCC env not set" }
          ./scripts/build-tauri-installer.ps1 -InnoCompiler $env:ISCC

      - name: Build signed updater artifacts
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            if ($env:GITHUB_REF -like 'refs/tags/*') {
              throw "TAURI_SIGNING_PRIVATE_KEY is required for a tagged Studio release"
            }
            Write-Host "TAURI_SIGNING_PRIVATE_KEY not set; skip updater artifacts"
            exit 0
          }
          ./scripts/build-updater-artifacts.ps1
          if ($LASTEXITCODE -ne 0) { throw "build-updater-artifacts.ps1 failed: $LASTEXITCODE" }
          $manifest = Get-Content dist-installer/latest.json -Raw | ConvertFrom-Json
          $platform = $manifest.platforms.'windows-x86_64'
          $expectedName = "CodexChatGateway-Studio-Setup-v$($manifest.version).exe"
          if (-not $platform.signature) { throw "latest.json has no installer signature" }
          if ($platform.url -notlike "*/$expectedName") {
            throw "latest.json must point to the full Studio installer: $($platform.url)"
          }

      - name: Upload Studio artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-chat-gateway-studio-windows-x64
          path: |
            dist-installer/CodexChatGateway-Studio-Setup-v*.exe
            dist-installer/CodexChatGateway-Studio-Setup-v*.exe.sha256
            dist-installer/CodexChatGateway-Studio-Setup-v*.exe.sig
            dist-installer/latest.json
          if-no-files-found: error

      - name: Publish GitHub Release (Studio)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $files = @(
            Get-ChildItem dist-installer -File -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Name -like 'CodexChatGateway-Studio-Setup-v*.exe' -or
                $_.Name -like 'CodexChatGateway-Studio-Setup-v*.exe.sha256' -or
                $_.Name -like 'CodexChatGateway-Studio-Setup-v*.exe.sig' -or
                $_.Name -eq 'latest.json'
              } |
              ForEach-Object FullName
          )
          if ($files.Count -eq 0) { throw "No Studio release files found under dist-installer" }
          Write-Host "Uploading:"
          $files | ForEach-Object { Write-Host "  $_" }

          $version = $tag -replace '^v',''
          $releaseTitle = "V$version"
          if ($version -eq '2.0.0') { $releaseTitle = 'V2.0.0 "Nova"' }
          $releaseFlags = @()
          if ($version -match '-') { $releaseFlags += '--prerelease' }
          $releaseNotesPath = "docs/RELEASE_v$version.md"
          if (Test-Path -LiteralPath $releaseNotesPath) {
            $notes = Get-Content -LiteralPath $releaseNotesPath -Raw
          } else {
            $notes = "Codex Chat Gateway Studio $tag`n`n" + (./scripts/release-notes.ps1 -Version $version)
          }

          $releaseReady = $false
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            gh release view $tag *> $null
            if ($LASTEXITCODE -eq 0) {
              $releaseReady = $true
              break
            }
            Write-Host "Create release attempt $attempt of 5"
            gh release create $tag --title $releaseTitle --notes $notes @releaseFlags
            if ($LASTEXITCODE -eq 0) {
              $releaseReady = $true
              break
            }
            # Another parallel job may have created it after our view failed.
            gh release view $tag *> $null
            if ($LASTEXITCODE -eq 0) {
              $releaseReady = $true
              break
            }
            if ($attempt -lt 5) { Start-Sleep -Seconds ([Math]::Min(30, 5 * $attempt)) }
          }
          if (-not $releaseReady) { throw "Unable to create or find release $tag after retries" }

          gh release edit $tag --title $releaseTitle --notes $notes @releaseFlags
          if ($LASTEXITCODE -ne 0) { throw "Unable to refresh release title and notes for $tag" }

          $releaseAssets = @((gh release view $tag --json assets | ConvertFrom-Json).assets)
          $obsoleteAssets = @($releaseAssets | Where-Object { $_.name -like 'CodexChatGateway-Studio-Updater-*' })
          foreach ($asset in $obsoleteAssets) {
            Write-Host "Removing obsolete bare-console updater asset: $($asset.name)"
            gh release delete-asset $tag $asset.name --yes
            if ($LASTEXITCODE -ne 0) { throw "Unable to remove obsolete asset $($asset.name)" }
          }

          foreach ($file in $files) {
            $uploaded = $false
            for ($attempt = 1; $attempt -le 5; $attempt++) {
              Write-Host "Upload $file attempt $attempt of 5"
              gh release upload $tag $file --clobber
              if ($LASTEXITCODE -eq 0) {
                $uploaded = $true
                break
              }
              # The upload endpoint can return 502/503 after storing the file.
              # Verify by name before treating the attempt as failed.
              $assetJson = gh release view $tag --json assets 2>$null
              if ($LASTEXITCODE -eq 0) {
                $assetNames = @((ConvertFrom-Json $assetJson).assets | ForEach-Object name)
                if ($assetNames -contains ([System.IO.Path]::GetFileName($file))) {
                  Write-Host "Upload response failed, but GitHub reports the asset present"
                  $uploaded = $true
                  break
                }
              }
              if ($attempt -lt 5) { Start-Sleep -Seconds ([Math]::Min(30, 5 * $attempt)) }
            }
            if (-not $uploaded) { throw "Unable to upload $file after retries" }
          }
